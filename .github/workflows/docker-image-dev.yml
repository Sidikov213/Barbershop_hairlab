name: Docker Build and Push

on:
  # Запускать при пуше в ветку 'main'
  push:
    branches:
      - dev
  # Также можно добавить возможность ручного запуска
  workflow_dispatch:

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    
    steps:
    
      - name: Checkout repository
        uses: actions/checkout@v4
        # 

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Set up Docker Buildx
        # Установка Buildx для более эффективной и современной сборки Docker-образов
        uses: docker/setup-buildx-action@v3
        
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # Контекст сборки: использовать текущую директорию
          context: . 
          # Путь к Dockerfile
          file: ./Dockerfile 
          # Включаем пуш образа в репозиторий
          push: true
          # Тегирование образа
          tags: |
            ${{ secrets.DOCKER_IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          # Добавляем метки для лучшей идентификации образа (optional)
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.created=${{ github.event.repository.pushed_at }}

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via rsync and run remote script
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
          REMOTE_PORT: ${{ secrets.DEPLOY_PORT }}
          
          # Мы не копируем файлы, поэтому SOURCE и TARGET могут быть пустыми или установлены на заглушку
          SOURCE: './' # Укажите любую заглушку, например, пустую папку 'build'
          TARGET: '/tmp/deploy_placeholder'
          
          # Запускаем ваш скрипт развертывания с правами root
          SCRIPT_AFTER: |
            sudo /home/dagcode/deploy_dagcode_front.sh
            
          # (Опционально) Добавляем опцию, которая может помочь с TTY/соединением, если проблема вернется
          SSH_CMD_ARGS: '-o StrictHostKeyChecking=no'
